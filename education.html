<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

body{
background:linear-gradient(135deg,#FFFDF2,#FFF6CC,#FFE78A);
overflow-x:hidden;
}

/* ดอกไม้ */

.flower{
position:fixed;
top:-40px;
font-size:28px;
pointer-events:none;
animation:fall linear infinite;
}

.f1{left:5%;animation-duration:8s;}
.f2{left:20%;animation-duration:10s;}
.f3{left:35%;animation-duration:9s;}
.f4{left:50%;animation-duration:12s;}
.f5{left:65%;animation-duration:8s;}
.f6{left:80%;animation-duration:10s;}
.f7{left:95%;animation-duration:9s;}

@keyframes fall{

0%{
transform:translateY(-100px) rotate(0deg);
}

100%{
transform:translateY(110vh) rotate(360deg);
}

}

/* จุดสีขาว */

.dot{

position:fixed;
top:-20px;
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:snow linear infinite;
opacity:.8;

}

.d1{left:10%;animation-duration:7s;}
.d2{left:30%;animation-duration:10s;}
.d3{left:50%;animation-duration:8s;}
.d4{left:70%;animation-duration:11s;}
.d5{left:90%;animation-duration:9s;}

@keyframes snow{

0%{
transform:translateY(-20px);
}

100%{
transform:translateY(110vh);
}

}

/* Menu */

nav{

background:white;
padding:18px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.08);

}

nav a{

text-decoration:none;
margin:0 18px;
font-size:18px;
font-weight:600;
color:#C28A00;

}

nav a:hover{

color:#F4B400;

}

/* Title */

.title{

text-align:center;
margin:50px;

}

.title h1{

font-size:50px;
color:#C28A00;

}

.line{

width:120px;
height:5px;
background:#F4C430;
margin:15px auto;
border-radius:30px;

}

/* Card */

.container{

max-width:1000px;
margin:auto;
padding:20px;

}

.card{

background:white;
padding:35px;
border-radius:25px;
margin-bottom:30px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
transition:.3s;

}

.card:hover{

transform:translateY(-8px);

}

.card h2{

color:#D4A017;
margin-bottom:15px;

}

.card p{

font-size:20px;
line-height:36px;
color:#555;

}

.button-box{

display:flex;
gap:20px;
margin:40px auto;
max-width:1000px;

}

.button{

flex:1;
padding:18px;
text-align:center;
background:#F4C430;
color:white;
text-decoration:none;
font-size:20px;
font-weight:bold;
border-radius:40px;

}

.button:hover{

background:#D4A017;

}

footer{

margin-top:50px;
background:#E6A800;
padding:20px;
text-align:center;
color:white;

}

</style>

</head>
